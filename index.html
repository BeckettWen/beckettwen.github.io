<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beckett Wen | Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-content">
            <a href="index.html" class="logo">Beckett Wen | Blog</a>
        </div>
    </nav>

    <main>
    <div id="home-view">
        <section class="hero">
            <div class="hero-bg" id="hero-bg"></div>
            <div class="hero-text">
                <span class="label">Latest Post</span>
                <h1 id="post-title">Loading...</h1>
                <p id="post-desc"></p>
                <a href="javascript:void(0)" onclick="readFullPost(currentPostPath)" class="cta">Read More ></a>
            </div>
        </section>

        <section class="newsroom-container">
    <div class="newsroom-header">
        <h2>Archive</h2>
    </div>
    <div class="newsroom-grid" id="newsroom-grid">
        </div>
    
    <div style="text-align: center; margin-top: 50px;">
        <a href="archive.html" class="cta" style="font-weight: 500; font-size: 20px;">See More Archive ></a>
    </div>
</section>
    </div>

    <section id="article-view" style="display:none; padding: 120px 20px;">
        <div id="full-content" style="max-width: 800px; margin: 0 auto;"></div>
        <div style="max-width: 800px; margin: 40px auto; text-align: center;">
            <a href="index.html" style="color: #0066cc; text-decoration: none; font-weight: 300;">← Back to Home</a>
        </div>
    </section>
</main>

<footer>
        <div class="footer-content">
            <div class="footer-top">
                <p>Copyright © 2026 Beckett Wen. All rights reserved.</p>
            </div>
            <div class="footer-bottom">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Use</a>
                <a href="#">Site Map</a>
                <span class="location">Earth</span>
            </div>
        </div>
    </footer>

    <script>
        let currentPostPath = "";

async function initBlog() {
    try {
        const response = await fetch('posts.json');
        const posts = await response.json();
        
        // 1. Setup Hero
        const latest = posts[0];
        document.getElementById('post-title').innerText = latest.title;
        document.getElementById('post-desc').innerText = latest.description;
        document.getElementById('hero-bg').style.backgroundImage = `url('${latest.imagePath}')`;
        currentPostPath = latest.contentPath;

        // 2. Setup Newsroom (Limited to first 3 posts)
        const grid = document.getElementById('newsroom-grid');
        const previewPosts = posts.slice(0, 3); // Shows only the 3 latest
        
        previewPosts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'newsroom-card';
            card.onclick = () => readFullPost(post.contentPath);
            card.innerHTML = `
                <div class="card-image" style="background-image: url('${post.imagePath}')"></div>
                <div class="card-info">
                    <span class="card-category">Journal</span>
                    <h3>${post.title}</h3>
                    <p>${post.description}</p>
                </div>`;
            grid.appendChild(card);
        });
    } catch (e) { console.error(e); }
}

async function readFullPost(path) {
    const response = await fetch(path);
    const htmlContent = await response.text();

    // Hide the entire Home view (Hero + Newsroom)
    document.getElementById('home-view').style.display = 'none';
    
    // Show the Article view and inject content
    document.getElementById('article-view').style.display = 'block';
    document.getElementById('full-content').innerHTML = htmlContent;
    
    window.scrollTo(0,0);
}

window.onload = initBlog;
    </script>
</body>
</html>
