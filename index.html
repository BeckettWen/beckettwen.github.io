<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beckett Wen | Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-content">
            <a href="index.html" class="logo">Beckett Wen</a>
        </div>
    </nav>

    <main>
        <section id="hero-view" class="hero">
            <div class="hero-bg" id="hero-bg"></div>
            
            <div class="hero-text">
                <span class="label">Latest Post</span>
                <h1 id="post-title">Loading...</h1>
                <p id="post-desc"></p>
                <a href="javascript:void(0)" onclick="readFullPost()" id="post-link" class="cta">Read More ></a>
            </div>
        </section>

        <section id="article-view" style="display:none; padding: 120px 20px; max-width: 800px; margin: 0 auto;">
            <div id="full-content"></div>
            <a href="index.html" style="display: inline-block; margin-top: 50px; color: #0066cc; text-decoration: none; font-weight: 500;"> ← Back to Home</a>
        </section>
    </main>

    <script>
        let currentPostPath = "";

        async function loadLatestPost() {
            try {
                const response = await fetch('posts.json');
                if (!response.ok) throw new Error("Could not find posts.json");
                
                const posts = await response.json();
                const latest = posts[0];

                // 1. Update text
                document.getElementById('post-title').innerText = latest.title;
                document.getElementById('post-desc').innerText = latest.description;
                
                // 2. Apply background image to the hero-bg div
                const bgElement = document.getElementById('hero-bg');
                bgElement.style.backgroundImage = `url('${latest.imagePath}')`;
                
                // 3. Store path for the reader
                currentPostPath = latest.contentPath;

                console.log("Image path loaded:", latest.imagePath);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('post-title').innerText = "Failed to load post.";
            }
        }

        async function readFullPost() {
            try {
                const response = await fetch(currentPostPath);
                const htmlContent = await response.text();

                document.getElementById('hero-view').style.display = 'none';
                document.getElementById('article-view').style.display = 'block';
                document.getElementById('full-content').innerHTML = htmlContent;
                
                window.scrollTo(0,0);
            } catch (error) {
                alert("Article could not be loaded.");
            }
        }

        window.onload = loadLatestPost;
    </script>
</body>
</html>
